<!doctype html>
<head>
  <meta charset="UTF-8" />
  <link href="reset.css" rel="stylesheet" />
  <link href="styles.css" rel="stylesheet" />
</head>
<body>
  
  <div class="weather-box">
    <h1 id="weather-location"></h1>
    <h1 id="weather-temp"></h1>
    <img id="weather-icon" src="" alt="" />
  </div>
  <div class="time-box">
    <h2 class="time-box--date"></h2>
    <h2 class="time-box--clock">ClockDebug</h2>
  </div>

  <form id="login-form">
    <input required maxlength="15" type="text" placeholder="이름을 입력하세요." />
    <button>로그인</button>
  </form>
  <button id="logout-btn" class="hidden">Logout</button>
  <div id="scheduler" class="hidden">
    <h2 id="greeting"></h2>
    
    <!-- 투두 리스트 추가 -->
    <form id="todo-form">
        <input type="text" placeholder="할 일을 입력하고 Enter!" required />
    </form>
    <ul id="todo-list"></ul>
  </div>

  <script src="main.js"></script>
  <script src="weather.js"></script>
  <script src="todo-list.js"></script>
</body>
